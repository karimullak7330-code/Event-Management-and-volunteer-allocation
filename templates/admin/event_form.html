{% extends 'base.html' %}
{% block content %}
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>{{ '✏️ Edit Event' if event else '➕ Create Event' }}</h2>
    <a class="btn btn-secondary" href="{{ url_for('admin_events') }}">← Back to Events</a>
  </div>
  <form method="post" class="card p-4">
    <div class="mb-3">
      <label class="form-label">Title</label>
      <input class="form-control" name="title" value="{{ event.title if event else '' }}" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Date</label>
      <input class="form-control" name="date" type="date" value="{% if event %}{{ event.date.strftime('%Y-%m-%d') }}{% endif %}" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Venue</label>
      <input class="form-control" name="location" value="{{ event.venue if event else '' }}">
    </div>
    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label">Start time</label>
        <input class="form-control" name="start_time" type="time" value="{% if event and event.start_time %}{{ event.start_time.strftime('%H:%M') }}{% endif %}">
      </div>
      <div class="col-md-6 mb-3">
        <label class="form-label">End time</label>
        <input class="form-control" name="end_time" type="time" value="{% if event and event.end_time %}{{ event.end_time.strftime('%H:%M') }}{% endif %}">
      </div>
    </div>
    <div class="mb-3">
      <label class="form-label">Description</label>
      <textarea class="form-control" name="description">{{ event.description if event else '' }}</textarea>
    </div>
    <button class="btn btn-success">💾 Save Event</button>
    <a class="btn btn-secondary ms-2" href="{{ url_for('admin_events') }}">Cancel</a>
  </form>
{% endblock %}
