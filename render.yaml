services:
  - type: web
    name: event-management
    env: python
    plan: free
    region: oregon
    buildCommand: python -m pip install --upgrade pip setuptools wheel && python -m pip install -r requirements.txt
    startCommand: python -m waitress --listen=0.0.0.0:$PORT app:app
    envVars:
      - key: SECRET_KEY
        value: ""
        sync: false
      - key: FLASK_DEBUG
        value: "0"
        sync: false
      - key: GEMINI_API_KEY
        value: ""
        sync: false
      - key: DATABASE_URL
        value: ""
        sync: false
    autoDeploy: true
